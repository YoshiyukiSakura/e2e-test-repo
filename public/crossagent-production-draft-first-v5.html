<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrossAgent production draft-first smoke v5</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #183246;
        color: #10202b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 32%),
          radial-gradient(circle at 18% 20%, rgba(102, 204, 156, 0.28), transparent 34%),
          #183246;
      }

      main {
        width: min(720px, 100%);
        text-align: center;
        background: #f7fbf8;
        border: 4px solid #18a957;
        border-radius: 8px;
        padding: clamp(28px, 6vw, 56px);
        box-shadow: 0 24px 70px rgba(5, 15, 24, 0.34);
      }

      .success-marker {
        width: 108px;
        height: 108px;
        margin: 0 auto 28px;
        border-radius: 50%;
        background: #18a957;
        border: 8px solid #dff5e9;
        position: relative;
      }

      .success-marker::after {
        content: "";
        position: absolute;
        left: 30px;
        top: 24px;
        width: 34px;
        height: 56px;
        border: solid #ffffff;
        border-width: 0 10px 10px 0;
        transform: rotate(45deg);
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1.04;
      }

      p {
        margin: 12px 0 0;
        font-size: clamp(1.15rem, 2.8vw, 1.5rem);
        font-weight: 700;
      }

      @media (max-width: 420px) {
        body {
          padding: 18px;
        }

        main {
          padding: 26px 18px;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="CrossAgent production draft-first smoke v5 status">
      <div
        class="success-marker"
        data-testid="success-check-marker"
        role="img"
        aria-label="Large green success check marker"
      ></div>
      <h1>CrossAgent production draft-first smoke v5</h1>
      <p>Evidence verified before ready review</p>
      <p>No manual intervention required</p>
    </main>
  </body>
</html>
