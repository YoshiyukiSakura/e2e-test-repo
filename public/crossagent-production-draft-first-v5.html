<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrossAgent production draft-first smoke v5</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #10221d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at top left, rgba(33, 150, 83, 0.36), transparent 34rem),
          linear-gradient(135deg, #0d1b2a 0%, #183d3d 52%, #10221d 100%);
        color: #f5fbf7;
      }

      main {
        width: min(720px, 100%);
        border: 3px solid #48d17b;
        border-radius: 8px;
        padding: clamp(28px, 6vw, 56px);
        background: rgba(8, 20, 18, 0.9);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
        text-align: center;
      }

      .success-marker {
        width: clamp(88px, 18vw, 128px);
        height: clamp(88px, 18vw, 128px);
        margin: 0 auto 28px;
        display: grid;
        place-items: center;
        border: 4px solid #6ee787;
        border-radius: 50%;
        background: #12883f;
        color: #ffffff;
        font-size: clamp(56px, 12vw, 84px);
        font-weight: 900;
        line-height: 1;
        box-shadow: 0 0 0 10px rgba(110, 231, 135, 0.14);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 7vw, 58px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .evidence {
        margin: 24px 0 0;
        font-size: clamp(20px, 4vw, 30px);
        font-weight: 700;
        color: #d6ffe1;
      }

      .automation {
        margin: 14px 0 0;
        font-size: clamp(18px, 3.4vw, 25px);
        color: #b9d8ff;
      }
    </style>
  </head>
  <body>
    <main aria-label="CrossAgent production draft-first smoke v5 panel">
      <div class="success-marker" data-testid="success-check-marker" aria-label="Large green success check marker">
        &#10003;
      </div>
      <h1>CrossAgent production draft-first smoke v5</h1>
      <p class="evidence">Evidence verified before ready review</p>
      <p class="automation">No manual intervention required</p>
    </main>
  </body>
</html>
