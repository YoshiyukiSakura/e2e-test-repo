<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrossAgent zero-touch visual smoke</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 237, 170, 0.9), transparent 30%),
          linear-gradient(135deg, #0f766e 0%, #14532d 46%, #312e81 100%);
        color: #102018;
      }

      main {
        width: min(720px, 100%);
        padding: clamp(28px, 5vw, 56px);
        border: 6px solid #34d399;
        border-radius: 8px;
        background: #fffbea;
        box-shadow: 0 24px 70px rgba(5, 15, 35, 0.45);
        text-align: center;
      }

      .success-marker {
        width: 112px;
        height: 112px;
        margin: 0 auto 24px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        border: 8px solid #064e3b;
        background: #16a34a;
        color: #ffffff;
        font-size: 72px;
        font-weight: 900;
        line-height: 1;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.3rem, 7vw, 4.2rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 10px 0 0;
        font-size: clamp(1.2rem, 3vw, 1.7rem);
        line-height: 1.35;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main aria-label="CrossAgent zero-touch visual smoke panel">
      <div class="success-marker" aria-label="Success check marker">✓</div>
      <h1>CrossAgent zero-touch visual smoke</h1>
      <p>Autonomous PR evidence checkpoint</p>
      <p>System-published visual proof required</p>
    </main>
  </body>
</html>
