<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrossAgent No-Touch Loop</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f4ed;
        color: #1d2733;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(65, 101, 115, 0.14), transparent 36%),
          linear-gradient(315deg, rgba(44, 122, 81, 0.14), transparent 34%),
          #f7f4ed;
      }

      main {
        width: min(92vw, 440px);
        border: 1px solid #d8d2c4;
        border-radius: 8px;
        padding: 32px;
        background: #fffdf8;
        box-shadow: 0 18px 50px rgba(28, 37, 45, 0.14);
        text-align: center;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 7vw, 2.75rem);
        line-height: 1.05;
        font-weight: 780;
        letter-spacing: 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        background: #118246;
        color: #ffffff;
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0;
      }

      .status-list {
        display: grid;
        gap: 10px;
        margin: 26px 0 0;
        padding: 0;
        list-style: none;
        text-align: left;
      }

      .status-list li {
        display: flex;
        align-items: center;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid #e6dfd1;
        border-radius: 8px;
        background: #fbf8f0;
        color: #26313c;
        font-size: 1rem;
        font-weight: 650;
      }

      .status-list li::before {
        content: "";
        width: 10px;
        height: 10px;
        margin-right: 12px;
        border-radius: 50%;
        background: #118246;
        box-shadow: 0 0 0 4px rgba(17, 130, 70, 0.13);
        flex: 0 0 auto;
      }
    </style>
  </head>
  <body>
    <main aria-label="No-touch visual smoke status">
      <h1>CrossAgent No-Touch Loop</h1>
      <div class="badge" aria-label="Visual status">VISUAL PASS</div>
      <ul class="status-list" aria-label="Loop checkpoints">
        <li>Issue imported</li>
        <li>Agent implemented</li>
        <li>PR evidence ready</li>
      </ul>
    </main>
  </body>
</html>
