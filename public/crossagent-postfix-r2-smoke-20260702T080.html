<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrossAgent post-fix R2 smoke 20260702T080</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #152033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 183, 166, 0.18), transparent 34%),
          linear-gradient(135deg, #f5f7fb 0%, #fff7ed 100%);
      }

      main {
        width: min(680px, 100%);
        border: 1px solid rgba(21, 32, 51, 0.12);
        border-top: 8px solid #00a88f;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 22px 60px rgba(21, 32, 51, 0.16);
        padding: clamp(28px, 6vw, 52px);
        text-align: center;
      }

      .check-marker {
        width: 84px;
        height: 84px;
        margin: 0 auto 24px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #00a88f;
        box-shadow: 0 14px 32px rgba(0, 168, 143, 0.35);
      }

      .check-marker svg {
        width: 48px;
        height: 48px;
        fill: none;
        stroke: #ffffff;
        stroke-width: 7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 48px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .status-list {
        display: grid;
        gap: 14px;
        margin: 28px 0 0;
        padding: 0;
        list-style: none;
      }

      .status-list li {
        border: 1px solid rgba(0, 168, 143, 0.32);
        border-left: 6px solid #ff6b35;
        border-radius: 8px;
        padding: 16px 18px;
        background: #fffaf7;
        font-size: clamp(18px, 3vw, 22px);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main aria-label="CrossAgent post-fix R2 smoke proof">
      <div class="check-marker" aria-label="Success check marker">
        <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
          <path d="M17 33.5 27.2 44 48 20"></path>
        </svg>
      </div>
      <h1>CrossAgent post-fix R2 smoke 20260702T080</h1>
      <ul class="status-list">
        <li>Fresh queue has no legacy blocker</li>
        <li>R2 visual evidence rendered</li>
      </ul>
    </main>
  </body>
</html>
