<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrossAgent autonomous visual smoke</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 18%, rgba(67, 206, 162, 0.5), transparent 28rem),
          linear-gradient(135deg, #12343b 0%, #256d7b 45%, #f2b84b 100%);
        color: #102026;
      }

      main {
        width: min(92vw, 720px);
        padding: clamp(2rem, 5vw, 4rem);
        text-align: center;
        background: #fff8e6;
        border: 6px solid #0f3b44;
        border-radius: 8px;
        box-shadow: 0 24px 70px rgba(10, 20, 24, 0.34);
      }

      .success-marker {
        width: 112px;
        height: 112px;
        margin: 0 auto 1.5rem;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #0f9f52;
        border: 8px solid #bff4d6;
        color: #ffffff;
        font-size: 4.75rem;
        font-weight: 900;
        line-height: 1;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.4rem, 7vw, 4.3rem);
        line-height: 1.02;
        letter-spacing: 0;
      }

      p {
        margin: 0.75rem 0 0;
        font-size: clamp(1.2rem, 3vw, 1.75rem);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main aria-label="CrossAgent autonomous visual smoke checkpoint">
      <div class="success-marker" aria-label="Success check marker">✓</div>
      <h1>CrossAgent autonomous visual smoke</h1>
      <p>No manual intervention checkpoint</p>
      <p>Rendered screenshot evidence is required</p>
    </main>
  </body>
</html>
