<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrossAgent smooth mode reload smoke</title>
    <style>
      :root {
        color: #172026;
        background: #0f5132;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(12, 70, 45, 0.96), rgba(18, 122, 94, 0.82)),
          repeating-linear-gradient(45deg, #0b3d2a 0 18px, #145f46 18px 36px);
      }

      main {
        width: min(760px, 100%);
        padding: 44px;
        text-align: center;
        background: #fff8e6;
        border: 6px solid #00a651;
        box-shadow: 0 22px 60px rgba(3, 26, 18, 0.35);
      }

      .success-marker {
        width: 128px;
        height: 128px;
        margin: 0 auto 24px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #12b76a;
        color: #ffffff;
        font-size: 82px;
        font-weight: 800;
        line-height: 1;
        border: 8px solid #067647;
        box-shadow: 0 12px 0 #054f31;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 42px;
        line-height: 1.12;
      }

      p {
        margin: 12px 0 0;
        font-size: 26px;
        line-height: 1.3;
        font-weight: 700;
      }

      @media (max-width: 520px) {
        body {
          padding: 18px;
        }

        main {
          padding: 28px 18px;
        }

        .success-marker {
          width: 104px;
          height: 104px;
          font-size: 66px;
        }

        h1 {
          font-size: 32px;
        }

        p {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="smoke-title">
      <div class="success-marker" aria-label="Success check marker" role="img">✓</div>
      <h1 id="smoke-title">CrossAgent smooth mode reload smoke</h1>
      <p>Reviewer routed visual evidence</p>
      <p>Stable R2 delivery image required</p>
    </main>
  </body>
</html>
