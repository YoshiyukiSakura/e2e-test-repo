<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrossAgent reloaded visual smoke</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #eef7f1;
        color: #15352b;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(44, 122, 86, 0.16), transparent 38%),
          linear-gradient(315deg, rgba(31, 88, 120, 0.18), transparent 42%),
          #eef7f1;
      }

      main {
        width: min(720px, calc(100vw - 48px));
        box-sizing: border-box;
        padding: 44px;
        border: 3px solid #1f7a55;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(21, 53, 43, 0.18);
        text-align: center;
      }

      .marker {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #1f7a55;
        color: #ffffff;
        font-size: 44px;
        font-weight: 800;
        line-height: 1;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 6vw, 3.5rem);
        line-height: 1.05;
      }

      p {
        margin: 12px 0 0;
        font-size: clamp(1.1rem, 3vw, 1.45rem);
        line-height: 1.45;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main aria-label="CrossAgent reloaded visual smoke marker">
      <div class="marker" aria-label="Success marker">✓</div>
      <h1>CrossAgent reloaded visual smoke</h1>
      <p>Runtime e2e classification verified</p>
      <p>Browser screenshot evidence captured</p>
    </main>
  </body>
</html>
