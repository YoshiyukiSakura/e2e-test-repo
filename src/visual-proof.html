<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrossAgent Visual Proof</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #182235;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid #d6deeb;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(24, 34, 53, 0.12);
        padding: 32px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
        line-height: 1.2;
      }

      .marker {
        display: block;
        margin: 18px 0;
        padding: 14px 16px;
        border: 1px solid #b9c8dc;
        border-radius: 6px;
        background: #eef5ff;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 18px;
        overflow-wrap: anywhere;
      }

      dl {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 10px 18px;
        margin: 22px 0 0;
      }

      dt {
        color: #53657d;
        font-weight: 700;
      }

      dd {
        margin: 0;
      }

      .checklist {
        margin-top: 24px;
        padding-top: 18px;
        border-top: 1px solid #dfe6f0;
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="proof-title">
      <h1 id="proof-title">CrossAgent Fresh Multimodal Proof</h1>
      <strong class="marker">FRESH-MULTIMODAL-R2-20260702T095749Z</strong>
      <dl aria-label="Proof details">
        <dt>Status</dt>
        <dd>Ready for R2 visual evidence verification</dd>
        <dt>Timestamp</dt>
        <dd>2026-07-02T09:57:49Z</dd>
      </dl>
      <div class="checklist" role="group" aria-label="Verification checklist">
        Checklist: browser surface rendered, marker visible, stable anchors present.
      </div>
    </main>
  </body>
</html>
