<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No-touch loop v3 visual smoke</title>
    <style>
      :root {
        color-scheme: light;
        --evidence-lime: #22c55e;
        --accent-magenta: #d946ef;
        --navy-block: #1e3a8a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #111827;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(760px, calc(100vw - 32px));
        border: 12px solid var(--evidence-lime);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.16);
        overflow: hidden;
      }

      .panel {
        padding: 40px;
        display: grid;
        gap: 24px;
      }

      .marker {
        margin: 0;
        color: var(--accent-magenta);
        font-size: 3rem;
        font-weight: 800;
        line-height: 1;
        white-space: nowrap;
      }

      .navy-block {
        margin: 0;
        padding: 24px;
        border-radius: 6px;
        background: var(--navy-block);
        color: #ffffff;
        font-size: 1.25rem;
        font-weight: 700;
        line-height: 1.4;
      }

      footer {
        padding: 18px 40px;
        border-top: 4px solid var(--accent-magenta);
        background: #f1f5f9;
        color: #111827;
        font-size: 1rem;
        font-weight: 700;
      }

      @media (max-width: 680px) {
        .panel {
          padding: 28px;
        }

        .marker {
          font-size: 1.75rem;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="No-touch loop v3 visual smoke page">
      <section class="panel">
        <h1 class="marker">VISUAL_DELTA_20260630_V3</h1>
        <p class="navy-block">Navy evidence block rendered with #1e3a8a for CrossAgent no-touch loop v3 verification.</p>
      </section>
      <footer>No-touch loop v3</footer>
    </main>
  </body>
</html>
